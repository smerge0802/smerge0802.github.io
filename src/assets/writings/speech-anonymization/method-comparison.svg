<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 620" role="img" aria-labelledby="title desc">
  <title id="title">음성 비식별화 기법별 청취 유사도 비교</title>
  <desc id="desc">원본과 변조 음성의 화자 유사도를 0점부터 5점까지 비교한 막대그래프. VTLN 1.52, Pitch 1.99, McAdams 2.05, Resampling 2.49이며 낮을수록 원 화자를 덜 떠올린다.</desc>
  <style>
    .bg { fill: #f7f7f7; }
    .grid { stroke: #d0d0d0; stroke-width: 1; }
    .axis { stroke: #0a0a0a; stroke-width: 1.5; }
    .bar { fill: #0a0a0a; }
    .bar-soft { fill: #8d8d8d; }
    .label { font: 600 25px 'Pretendard', Arial, sans-serif; fill: #0a0a0a; }
    .body { font: 400 20px 'Pretendard', Arial, sans-serif; fill: #3f3f3f; }
    .value { font: 650 30px 'Pretendard', Arial, sans-serif; fill: #0a0a0a; }
    .micro { font: 500 15px 'Pretendard', Arial, sans-serif; letter-spacing: 1.4px; fill: #666; }
  </style>
  <rect class="bg" width="1200" height="620" rx="4"/>
  <text class="micro" x="72" y="66">HUMAN EVALUATION · LOWER IS BETTER</text>
  <text class="label" x="72" y="112">원본과 변조 음성의 화자 유사도</text>
  <text class="body" x="72" y="143">0점 = 아주 다름 · 5점 = 아주 비슷함</text>

  <line class="axis" x1="300" y1="520" x2="1040" y2="520"/>
  <line class="grid" x1="448" y1="190" x2="448" y2="520"/>
  <line class="grid" x1="596" y1="190" x2="596" y2="520"/>
  <line class="grid" x1="744" y1="190" x2="744" y2="520"/>
  <line class="grid" x1="892" y1="190" x2="892" y2="520"/>
  <line class="grid" x1="1040" y1="190" x2="1040" y2="520"/>
  <text class="micro" x="294" y="552">0</text>
  <text class="micro" x="442" y="552">1</text>
  <text class="micro" x="590" y="552">2</text>
  <text class="micro" x="738" y="552">3</text>
  <text class="micro" x="886" y="552">4</text>
  <text class="micro" x="1034" y="552">5</text>

  <text class="label" x="72" y="225">VTLN</text>
  <rect class="bar" x="300" y="190" width="225" height="42" rx="2"/>
  <text class="value" x="545" y="224">1.52</text>

  <text class="label" x="72" y="305">Pitch</text>
  <rect class="bar-soft" x="300" y="270" width="295" height="42" rx="2"/>
  <text class="value" x="615" y="304">1.99</text>

  <text class="label" x="72" y="385">McAdams</text>
  <rect class="bar-soft" x="300" y="350" width="303" height="42" rx="2"/>
  <text class="value" x="623" y="384">2.05</text>

  <text class="label" x="72" y="465">Resampling</text>
  <rect class="bar-soft" x="300" y="430" width="369" height="42" rx="2"/>
  <text class="value" x="689" y="464">2.49</text>
</svg>
