<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="650" viewBox="0 0 1200 650" role="img" aria-labelledby="title desc">
  <title id="title">MUTE threat model</title>
  <desc id="desc">공개 음성을 MUTE로 보호한 뒤 black-box talking-head model과 후처리, 잡음 제거, TTS 재합성 공격을 거쳐도 입 모양과 음성의 정렬이 무너지도록 하는 흐름</desc>
  <defs>
    <linearGradient id="protect" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#7c5cff"/><stop offset="1" stop-color="#4f46e5"/></linearGradient>
    <linearGradient id="output" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#fff4ea"/><stop offset="1" stop-color="#ffe1db"/></linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#1f2937" flood-opacity=".08"/></filter>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto"><path d="M0 0l10 5-10 5z" fill="#8b8b95"/></marker>
  </defs>
  <rect width="1200" height="650" rx="28" fill="#fafafa"/>
  <text x="64" y="68" font-family="Pretendard, Arial, sans-serif" font-size="28" font-weight="700" fill="#151515">Protect before exploitation</text>
  <text x="64" y="103" font-family="Pretendard, Arial, sans-serif" font-size="17" fill="#6b6b73">얼굴 영상은 그대로 두고, 공개 전 음성에만 작은 보호 교란을 더한다</text>

  <g filter="url(#shadow)">
    <rect x="64" y="157" width="226" height="280" rx="22" fill="#fff" stroke="#e5e5e7"/>
    <circle cx="124" cy="229" r="34" fill="#f1f1f3"/>
    <circle cx="124" cy="221" r="12" fill="#a3a3aa"/><path d="M98 258c4-20 48-20 52 0" fill="#a3a3aa"/>
    <text x="177" y="221" font-family="Pretendard, Arial, sans-serif" font-size="16" font-weight="650" fill="#202024">Portrait</text>
    <text x="177" y="247" font-family="Pretendard, Arial, sans-serif" font-size="14" fill="#77777f">visual input</text>
    <path d="M91 339c16-35 31 35 47 0s31 35 47 0 31 35 47 0" fill="none" stroke="#4f46e5" stroke-width="4" stroke-linecap="round"/>
    <text x="92" y="390" font-family="Pretendard, Arial, sans-serif" font-size="16" font-weight="650" fill="#202024">Original speech</text>
    <text x="92" y="415" font-family="Pretendard, Arial, sans-serif" font-size="14" fill="#77777f">audio driver</text>
  </g>

  <path d="M310 297h82" stroke="#8b8b95" stroke-width="2.5" marker-end="url(#arrow)"/>
  <g filter="url(#shadow)">
    <rect x="410" y="201" width="210" height="192" rx="26" fill="url(#protect)"/>
    <text x="515" y="263" text-anchor="middle" font-family="Pretendard, Arial, sans-serif" font-size="36" font-weight="750" fill="#fff">MUTE</text>
    <text x="515" y="298" text-anchor="middle" font-family="Pretendard, Arial, sans-serif" font-size="15" fill="#e8e5ff">audio-only protection</text>
    <rect x="452" y="326" width="126" height="34" rx="17" fill="#ffffff" fill-opacity=".16"/>
    <text x="515" y="348" text-anchor="middle" font-family="Pretendard, Arial, sans-serif" font-size="13" font-weight="600" fill="#fff">‖δ‖∞ ≤ 0.01</text>
  </g>

  <path d="M640 297h78" stroke="#8b8b95" stroke-width="2.5" marker-end="url(#arrow)"/>
  <g filter="url(#shadow)">
    <rect x="738" y="157" width="190" height="280" rx="22" fill="#fff" stroke="#e5e5e7"/>
    <text x="833" y="213" text-anchor="middle" font-family="Pretendard, Arial, sans-serif" font-size="18" font-weight="700" fill="#202024">Unknown attacker</text>
    <rect x="774" y="246" width="118" height="42" rx="21" fill="#f2f0ff"/><text x="833" y="272" text-anchor="middle" font-family="Pretendard, Arial, sans-serif" font-size="14" font-weight="650" fill="#5b49d6">Black-box model</text>
    <rect x="774" y="302" width="118" height="42" rx="21" fill="#f4f4f5"/><text x="833" y="328" text-anchor="middle" font-family="Pretendard, Arial, sans-serif" font-size="14" fill="#58585f">Postprocess</text>
    <rect x="774" y="358" width="118" height="42" rx="21" fill="#f4f4f5"/><text x="833" y="384" text-anchor="middle" font-family="Pretendard, Arial, sans-serif" font-size="14" fill="#58585f">Denoiser / TTS</text>
  </g>

  <path d="M948 297h76" stroke="#8b8b95" stroke-width="2.5" marker-end="url(#arrow)"/>
  <g filter="url(#shadow)">
    <rect x="1042" y="177" width="102" height="240" rx="20" fill="url(#output)" stroke="#ffcfc5"/>
    <g transform="translate(1061 213)"><circle cx="31" cy="31" r="30" fill="#f8b7aa"/><circle cx="21" cy="27" r="3" fill="#513d39"/><circle cx="41" cy="27" r="3" fill="#513d39"/><path d="M20 44c9 8 18 8 24 0" fill="none" stroke="#513d39" stroke-width="3"/></g>
    <g transform="translate(1061 292)"><circle cx="31" cy="31" r="30" fill="#f8b7aa"/><circle cx="21" cy="27" r="3" fill="#513d39"/><circle cx="41" cy="27" r="3" fill="#513d39"/><ellipse cx="32" cy="45" rx="9" ry="5" fill="#513d39"/></g>
    <path d="M1058 390h67" stroke="#db5c4d" stroke-width="3" stroke-dasharray="5 6"/>
  </g>
  <text x="1093" y="463" text-anchor="middle" font-family="Pretendard, Arial, sans-serif" font-size="15" font-weight="700" fill="#b84338">Misaligned output</text>

  <rect x="64" y="500" width="1080" height="94" rx="18" fill="#151515"/>
  <text x="94" y="540" font-family="Pretendard, Arial, sans-serif" font-size="15" font-weight="700" fill="#aaaab2">DEFENSE TARGET</text>
  <text x="94" y="570" font-family="Pretendard, Arial, sans-serif" font-size="20" font-weight="650" fill="#fff">음성 내용은 들리게 유지하면서, 음성과 입 모양을 연결하는 정렬 구조는 사용할 수 없게 만든다.</text>
</svg>
